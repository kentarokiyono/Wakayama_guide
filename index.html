<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1b3a5c">
<title>わかやまガイド</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--indigo:#1b3a5c;--il:#2a5a8c;--ip:rgba(27,58,92,0.06);--im:rgba(27,58,92,0.12);--ib:rgba(27,58,92,0.08);--sky:#4a90c4;--sp:rgba(74,144,196,0.08);--bg:#f8f9fb;--card:#fff;--text:#1a1a2e;--t2:#5a5a6e;--t3:#a0a0b0;--green:#2d9a5c;--amber:#d4871a;--red:#c0392b;--purple:#7c5cbf;--gold:#c59b34;--sans:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;--r:16px;--rs:12px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0;background:transparent}
@keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(74,144,196,0.15)}50%{box-shadow:0 0 0 8px rgba(74,144,196,0)}}
.anim{animation:fadeSlide .3s ease}

/* ── Header ── */
.hd{padding:16px 20px 6px;text-align:center;flex-shrink:0;position:relative;z-index:10}
.hd h1{font-size:18px;font-weight:600;letter-spacing:.5px;color:var(–indigo)}
.hd-line{width:40px;height:2px;background:linear-gradient(90deg,var(–indigo),var(–sky));margin:8px auto;border-radius:1px}
.hd-btns{position:absolute;right:16px;top:12px;display:flex;gap:6px}
.hd-btn{background:none;border:1px solid var(–ib);border-radius:20px;padding:4px 10px;font-size:10px;color:var(–t3);cursor:pointer;font-family:var(–sans)}

/* ── Bus Navigator ── */
.bus-nav{background:var(–card);border:1px solid var(–ib);border-radius:var(–r);padding:14px;margin-bottom:16px}
.bus-nav-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bus-nav-hd h3{font-size:13px;font-weight:600;color:var(–indigo)}
.bus-nav-btn{background:var(–ip);border:1px solid var(–ib);border-radius:20px;padding:4px 12px;font-size:10px;color:var(–sky);cursor:pointer;font-family:var(–sans)}
.bus-nav-btn:active{background:var(–sp)}
.bus-result{display:flex;flex-direction:column;gap:8px}
.bus-stop{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(–bg);border-radius:var(–rs)}
.bus-stop-dist{min-width:52px;text-align:center}
.bus-stop-dist .num{font-family:var(–mono);font-size:16px;font-weight:700;color:var(–indigo)}
.bus-stop-dist .unit{font-size:9px;color:var(–t3)}
.bus-stop-info{flex:1}
.bus-stop-info h4{font-size:13px;font-weight:600}
.bus-stop-info p{font-size:10px;color:var(–t2);line-height:1.4}
.bus-stop-dir{font-size:18px;color:var(–sky);flex-shrink:0}
.bus-loading{text-align:center;font-size:12px;color:var(–t3);padding:12px}
.bus-err{text-align:center;font-size:11px;color:var(–t3);padding:8px;line-height:1.5}

/* ── Content ── */
.content{flex:1;display:flex;flex-direction:column;min-height:0}
.vw{flex:1;display:none;flex-direction:column;min-height:0}.vw.on{display:flex}
.vw-scroll{flex:1;overflow-y:auto;padding:0 20px 20px;-webkit-overflow-scrolling:touch}

/* ── Bottom Nav (replaces top nav) ── */
.bnav{flex-shrink:0;display:flex;border-top:1px solid var(–ib);background:var(–card);padding:6px 8px 0;padding-bottom:max(6px,env(safe-area-inset-bottom))}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .2s;color:var(–t3);position:relative}
.bn.on{color:var(–indigo)}
.bn.on::after{content:’’;position:absolute;top:-7px;width:20px;height:2px;border-radius:1px;background:var(–indigo)}
.bn-ic{font-size:16px;line-height:1}
.bn-lb{font-size:9px;font-weight:500}

/* ── Explore Page ── */
.sec-title{font-size:11px;font-weight:600;color:var(–t3);letter-spacing:1.5px;margin:16px 0 10px;text-transform:uppercase}
.guide-cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.gcat{background:var(–card);border:1px solid var(–ib);border-radius:var(–r);padding:18px 12px;cursor:pointer;text-align:center;transition:all .2s}
.gcat:active{transform:scale(.97);background:var(–ip)}
.gcat .gn{font-size:13px;font-weight:600;color:var(–indigo)}
.gcat .gc{font-size:10px;color:var(–t3);margin-top:3px}
.guide-list{display:flex;flex-direction:column;gap:6px}
.gi{background:var(–card);border:1px solid var(–ib);border-radius:var(–r);padding:14px;cursor:pointer;transition:all .2s}
.gi:active{transform:scale(.98)}
.gi h3{font-size:14px;font-weight:600;color:var(–indigo);margin-bottom:2px}
.gi .gm{font-size:11px;color:var(–t3)}
.gi .gd{font-size:12px;color:var(–t2);margin-top:6px;line-height:1.7;display:none}
.gi.open .gd{display:block}
.gi .gtags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.gtag{padding:2px 8px;border-radius:6px;font-size:9px;font-weight:600}
.gtag-r{background:rgba(74,144,196,.08);color:var(–sky)}
.gtag-g{background:rgba(45,154,92,.08);color:var(–green)}
.back-btn{background:none;border:1px solid var(–ib);border-radius:20px;padding:5px 14px;font-size:11px;color:var(–sky);cursor:pointer;font-family:var(–sans);margin-bottom:12px}

/* ── FAQ (from original) ── */
.faq-bread{display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 0 16px;font-size:12px;color:var(–t3)}
.faq-bread button{background:none;border:none;color:var(–sky);font-size:12px;font-family:var(–sans);cursor:pointer;font-weight:500}
.faq-home{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:360px;margin:0 auto}
.cat-card{background:var(–card);border:1px solid var(–ib);border-radius:var(–r);padding:22px 14px 18px;cursor:pointer;transition:all .25s;text-align:center}
.cat-card:active{transform:scale(.97);background:var(–ip)}
.cat-card .cn{font-size:14px;font-weight:600;color:var(–indigo)}
.cat-card .cc{font-size:11px;color:var(–t3);margin-top:5px}
.faq-q{width:100%;padding:14px 0;border:none;background:transparent;font-family:var(–sans);font-size:14px;color:var(–text);text-align:center;cursor:pointer;border-bottom:1px solid var(–ib)}
.faq-q:active{color:var(–sky)}.faq-q:last-child{border-bottom:none}
.faq-ans{max-width:420px;margin:0 auto}
.faq-ans h3{font-size:17px;font-weight:600;color:var(–indigo);text-align:center;margin-bottom:16px;line-height:1.5}
.faq-ans .body{font-size:13.5px;line-height:2;color:var(–t2)}
.faq-ans .body a{color:var(–sky);text-decoration:none;word-break:break-all}

/* ── Chat (from original) ── */
.usage-bar{display:flex;align-items:center;gap:8px;padding:4px 20px 6px;max-width:400px;margin:0 auto;width:100%}
.usage-bar .lb{font-size:10px;color:var(–t3);font-family:var(–mono)}
.tracks{flex:1;display:flex;gap:5px}
.track{flex:1;height:3px;border-radius:2px;background:var(–ip)}
.fill{height:100%;border-radius:2px;transition:width .4s}
.chat-scroll{flex:1;overflow-y:auto;padding:8px 20px}
.msg{display:flex;flex-direction:column;margin-bottom:12px}
.msg.user{align-items:flex-end}.msg.assistant{align-items:flex-start}
.bubble{max-width:84%;padding:11px 15px;font-size:13.5px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.bubble a{color:var(–sky);text-decoration:underline;word-break:break-all}
.msg.assistant .bubble{border-radius:16px 16px 16px 4px;background:var(–card);border:1px solid var(–ib)}
.msg.user .bubble{border-radius:16px 16px 4px 16px;background:var(–indigo);color:rgba(255,255,255,.95)}
.mbadge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-family:var(–mono);border-radius:6px;padding:2px 7px;margin-top:3px}
.mbadge .dot{width:4px;height:4px;border-radius:50%}
.typing{display:flex;margin-bottom:12px}
.typing-in{padding:11px 16px;border-radius:16px 16px 16px 4px;background:var(–card);border:1px solid var(–ib);display:flex;align-items:center;gap:8px}
.dots{display:flex;gap:3px}.d{width:5px;height:5px;border-radius:50%;opacity:.4;animation:bounce 1.2s infinite}
.d:nth-child(2){animation-delay:.15s}.d:nth-child(3){animation-delay:.3s}
.err-msg{text-align:center;color:#b33;font-size:12px;padding:8px;background:rgba(180,50,50,0.06);border-radius:var(–rs);margin:8px 20px}
.in-area{padding:6px 16px 12px;flex-shrink:0}
.in-row{display:flex;align-items:flex-end;gap:6px;max-width:480px;margin:0 auto}
.mic,.vbtn{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:1px solid var(–ib);background:var(–card)}
.mic.on{border-color:var(–sky);background:var(–sp);animation:pulse 1.5s infinite}
.in-wrap{flex:1;display:flex;background:var(–card);border-radius:20px;border:1px solid var(–ib);overflow:hidden}
.in-wrap input{flex:1;border:none;outline:none;padding:9px 14px;font-size:14px;font-family:var(–sans);background:transparent;color:var(–text)}
.send{background:transparent;border:none;padding:0 14px;color:var(–t3);font-size:16px;cursor:not-allowed;display:flex;align-items:center}
.send.ready{background:var(–indigo);color:#fff;cursor:pointer;border-radius:0 20px 20px 0}

/* ── My Trip ── */
.stamp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.st-item{background:var(–card);border:1px solid var(–ib);border-radius:var(–r);padding:12px 6px;text-align:center;cursor:pointer;transition:all .2s}
.st-item:active{transform:scale(.95)}
.st-item.got{border-color:var(–green);background:rgba(45,154,92,.04)}
.st-n{font-size:10px;font-weight:500;margin-top:4px;line-height:1.3}
.st-check{width:28px;height:28px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.st-check.empty{border:2px dashed var(–ib);color:transparent}
.st-check.done{background:var(–green);color:#fff}
.prog-bar{height:6px;border-radius:3px;background:var(–ip);margin-bottom:16px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(–green),var(–sky));transition:width .6s}
.trip-card{background:var(–card);border:1px solid var(–ib);border-radius:var(–r);padding:16px;margin-bottom:10px;cursor:pointer;text-align:center}
.trip-card:active{transform:scale(.98)}
.trip-card h3{font-size:14px;font-weight:600;color:var(–indigo);margin-bottom:4px}
.trip-card p{font-size:11px;color:var(–t2);line-height:1.5}
.trip-btn{display:inline-block;margin-top:10px;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:var(–sans)}

/* ── Survey ── */
.sv-progress{font-size:10px;color:var(–t3);text-align:center;margin-bottom:8px;font-family:var(–mono)}
.sv-q{font-size:16px;font-weight:600;text-align:center;color:var(–indigo);margin-bottom:16px;line-height:1.5}
.sv-opts{display:flex;flex-direction:column;gap:6px;max-width:380px;margin:0 auto}
.sv-opt{padding:12px 16px;border:1.5px solid var(–ib);border-radius:var(–rs);background:var(–card);font-size:14px;font-family:var(–sans);color:var(–text);cursor:pointer;text-align:center;transition:all .15s}
.sv-opt:active{transform:scale(.97)}
.sv-opt.sel{border-color:var(–indigo);background:var(–ip);font-weight:500}
.sv-input{width:100%;max-width:380px;margin:0 auto;display:block;padding:12px 16px;border:1.5px solid var(–ib);border-radius:var(–rs);font-size:15px;font-family:var(–sans);background:var(–card);outline:none}
.sv-input:focus{border-color:var(–sky)}
.sv-night{display:flex;gap:16px;max-width:300px;margin:0 auto}
.sv-nf{flex:1;text-align:center}
.sv-nf label{font-size:11px;color:var(–t3);display:block;margin-bottom:6px}
.sv-stepper{display:flex;align-items:center;background:var(–card);border:1.5px solid var(–ib);border-radius:var(–rs);overflow:hidden}
.sv-sb{width:40px;height:40px;border:none;background:transparent;font-size:18px;color:var(–sky);cursor:pointer;font-family:var(–sans)}
.sv-sv{flex:1;text-align:center;font-size:18px;font-weight:700}
.sv-nav{display:flex;gap:8px;justify-content:center;margin-top:20px}
.sv-btn{padding:10px 28px;border-radius:20px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:var(–sans)}
.sv-btn-back{background:var(–ip);color:var(–t3)}
.sv-btn-next{background:var(–indigo);color:#fff}
.sv-btn-next:disabled{opacity:.3;cursor:default}
/* Omamori */
.omamori{width:160px;height:240px;border-radius:16px;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;box-shadow:0 6px 30px rgba(0,0,0,.2);animation:fadeSlide .6s ease}
.om-i{font-size:36px;margin-bottom:8px}.om-n{font-size:15px;font-weight:700}.om-b{font-size:10px;opacity:.7;font-style:italic}
.coupon-box{background:var(–indigo);color:#fff;border-radius:var(–r);padding:16px;text-align:center;margin:12px auto;max-width:300px}
.coupon-code{font-family:var(–mono);font-size:18px;letter-spacing:.15em;background:rgba(255,255,255,.1);padding:6px 14px;border-radius:8px;display:inline-block;margin-top:6px}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(27,58,92,.25);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(–card);border-radius:20px;padding:28px;max-width:360px;width:100%}
.modal h2{text-align:center;font-size:16px;font-weight:600;color:var(–indigo);margin-bottom:4px}
.modal .desc{text-align:center;font-size:12px;color:var(–t2);line-height:1.6;margin-bottom:16px}
.modal input[type=“password”]{width:100%;padding:10px 12px;border-radius:var(–rs);border:1px solid var(–ib);font-size:13px;font-family:var(–mono);background:var(–bg);outline:none}
.modal .lnk{display:block;text-align:center;margin:8px 0;font-size:11px;color:var(–sky);text-decoration:none}
.modal .sbtn{width:100%;padding:11px;border-radius:var(–rs);border:none;background:rgba(0,0,0,.04);color:var(–t3);font-size:14px;font-weight:600;cursor:not-allowed;font-family:var(–sans);transition:all .2s}
.modal .sbtn.ready{background:var(–indigo);color:#fff;cursor:pointer}
.modal .info{margin-top:12px;padding:10px;border-radius:var(–rs);background:var(–ip);font-size:10px;color:var(–t2);line-height:1.6;text-align:center}
.code-digit{width:48px;height:56px;border-radius:var(–rs);border:2px solid var(–ib);background:var(–bg);font-family:var(–mono);font-size:24px;font-weight:700;text-align:center;color:var(–text);outline:none;-webkit-appearance:none}
.code-digit:focus{border-color:var(–sky);background:var(–card)}
.ft{padding:4px 0;text-align:center;flex-shrink:0}.ft p{font-size:8px;color:var(–t3);font-family:var(–mono)}

/* ── Dark Mode ── */
@media(prefers-color-scheme:dark){
:root{–bg:#0d1117;–card:#161b22;–text:#e6edf3;–t2:#8b949e;–t3:#6e7681;–ib:rgba(255,255,255,.08);–ip:rgba(255,255,255,.04);–im:rgba(255,255,255,.1)}
body{background:var(–bg);color:var(–text)}
.hd h1{color:#e6edf3}
.bnav{background:#161b22;border-top-color:rgba(255,255,255,.06)}
.bn.on{color:var(–sky)}
.bn.on::after{background:var(–sky)}
.gcat,.gi,.cat-card,.trip-card,.st-item,.sv-opt,.uc,.mt{background:var(–card);border-color:rgba(255,255,255,.08)}
.gcat:active,.gi:active,.cat-card:active{background:rgba(255,255,255,.06)}
.gcat .gn,.cat-card .cn,.gi h3,.faq-ans h3{color:#e6edf3}
.gi .gd{color:var(–t2)}
.faq-q{color:#e6edf3;border-bottom-color:rgba(255,255,255,.06)}
.faq-ans .body{color:var(–t2)}
.msg.assistant .bubble{background:var(–card);border-color:rgba(255,255,255,.08);color:#e6edf3}
.in-wrap{background:var(–card);border-color:rgba(255,255,255,.08)}
.in-wrap input{color:#e6edf3;background:transparent}
.mic,.vbtn{background:var(–card);border-color:rgba(255,255,255,.08)}
.modal{background:var(–card)}
.modal h2{color:#e6edf3}
.modal input[type=“password”]{background:var(–bg);color:#e6edf3;border-color:rgba(255,255,255,.1)}
.sv-input{background:var(–card);color:#e6edf3;border-color:rgba(255,255,255,.08)}
.sv-opt{background:var(–card);color:#e6edf3;border-color:rgba(255,255,255,.08)}
.sv-opt.sel{background:rgba(74,144,196,.15);border-color:var(–sky)}
.sv-stepper{background:var(–card);border-color:rgba(255,255,255,.08)}
.sv-stepper .sv-sv{color:#e6edf3}
.sv-q{color:#e6edf3}
.back-btn{border-color:rgba(255,255,255,.1);color:var(–sky)}
.st-item.got{border-color:var(–green);background:rgba(45,154,92,.1)}
.prog-bar{background:rgba(255,255,255,.06)}
.usage-bar .track{background:rgba(255,255,255,.06)}
.code-digit{background:var(–bg);color:#e6edf3;border-color:rgba(255,255,255,.12)}
.code-digit:focus{background:var(–card);border-color:var(–sky)}
.err-msg{background:rgba(180,50,50,.15)}
.gtag-r{background:rgba(74,144,196,.12)}.gtag-g{background:rgba(45,154,92,.12)}
.trip-card{background:var(–card);border-color:rgba(255,255,255,.08)}
.trip-card h3{color:#e6edf3}
.bus-nav{background:var(–card);border-color:rgba(255,255,255,.08)}
.bus-nav-hd h3{color:#e6edf3}
.bus-stop{background:rgba(255,255,255,.04)}
.bus-stop-dist .num{color:var(–sky)}
.bus-stop-info h4{color:#e6edf3}
}
</style>

</head>
<body>
<header class="hd">
  <h1 id="hdTitle">わかやまガイド</h1>
  <div class="hd-btns">
    <button class="hd-btn" onclick="toggleLang()" id="langBtn">EN</button>
    <button class="hd-btn" id="keyBtn" style="display:none" onclick="resetKey()">Key</button>
  </div>
</header>
<div class="hd-line"></div>
<div class="content">
  <!-- EXPLORE -->
  <div class="vw on" id="exploreView"><div class="vw-scroll" id="exploreScroll"></div></div>
  <!-- FAQ -->
  <div class="vw" id="faqView"><div class="vw-scroll" id="faqScroll"></div></div>
  <!-- CHAT -->
  <div class="vw" id="chatView">
    <div class="usage-bar"><span class="lb">残</span><div class="tracks"><div class="track"><div class="fill" id="uL" style="width:100%;background:var(--green)"></div></div><div class="track"><div class="fill" id="uF" style="width:100%;background:var(--amber)"></div></div><div class="track"><div class="fill" id="uP" style="width:100%;background:var(--indigo)"></div></div></div><span class="lb" id="uC">1,350</span></div>
    <div class="chat-scroll" id="chatScroll"></div>
    <div class="in-area"><div class="in-row">
      <button class="mic" id="micBtn" onclick="toggleMic()">🎤</button>
      <div class="in-wrap"><input type="text" id="chatIn" placeholder=""><button class="send" id="sendBtn" onclick="sendMsg()">↑</button></div>
      <button class="vbtn" id="vBtn" onclick="toggleV()">🔊</button>
    </div></div>
  </div>
  <!-- MY TRIP -->
  <div class="vw" id="tripView"><div class="vw-scroll" id="tripScroll"></div></div>
  <!-- SURVEY -->
  <div class="vw" id="surveyView"><div class="vw-scroll" id="surveyScroll"></div></div>
</div>
<div class="ft"><p id="ftTxt">Powered by Gemini · CRM Session Active</p></div>
<div class="bnav">

let userLat=null,userLng=null,busLocating=false;

function distKm(lat1,lng1,lat2,lng2){
const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearingDir(lat1,lng1,lat2,lng2){
const dLng=(lng2-lng1)*Math.PI/180;
const y=Math.sin(dLng)*Math.cos(lat2*Math.PI/180);
const x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLng);
const b=(Math.atan2(y,x)*180/Math.PI+360)%360;
const dirs=[“N”,“NE”,“E”,“SE”,“S”,“SW”,“W”,“NW”];
const arrows=[”^”,”^>”,”>”,“v>”,“v”,”<v”,”<”,”<^”];
return arrows[Math.round(b/45)%8];
}

function locateBus(){
if(busLocating)return;
if(!navigator.geolocation){renderBusResult(“nogeo”);return}
busLocating=true;
renderBusResult(“loading”);
navigator.geolocation.getCurrentPosition(
pos=>{userLat=pos.coords.latitude;userLng=pos.coords.longitude;busLocating=false;renderBusResult(“ok”)},
err=>{busLocating=false;renderBusResult(“err”)},
{enableHighAccuracy:true,timeout:8000}
);
}

function renderBusStops(){
const sorted=BUS_STOPS.map(s=>{
const d=distKm(userLat,userLng,s.lat,s.lng);

return {…s,dist:d,dir};
}).sort((a,b)=>a.dist-b.dist).slice(0,3);
return `<div class="bus-result">${sorted.map(s=>{ const dStr=s.dist<1?(Math.round(s.dist*1000)+"m"):(s.dist.toFixed(1)+"km"); return `<div class="bus-stop"><div class="bus-stop-dist"><div class="num">${dStr.replace(/[a-z]+/,””)}</div><div class="unit">${dStr.replace(/[0-9.]+/,””)}</div></div><div class="bus-stop-info"><h4>${tt(s.n)}</h4><p>${tt(s.info)}</p></div><div class="bus-stop-dir">${s.dir}</div></div>`; }).join("")}</div>`;

const SYSTEM_PROMPT=`あなたは「わかやまガイドAI」。和歌山市の観光案内AI。バスのりば、観光スポット、グルメを案内。200文字以内で完結。確信のない情報は「観光案内所でご確認ください」と添える。時刻検索URL: ${NAV}`;

function hideTyp(){const e=document.getElementById(“typI”);if(e)e.remove()}

function rstDay(){const d=new Date().toDateString();if(usage.date!==d)usage={date:d,lite:0,flash:0,pro:0}}
function canUse(t){rstDay();return usage[t]<MODELS[t].limit}
function inc(t){rstDay();usage[t]++;updUI()}
function updUI(){rstDay();const r={l:MODELS.lite.limit-usage.lite,f:MODELS.flash.limit-usage.flash,p:MODELS.pro.limit-usage.pro};document.getElementById(“uL”).style.width=(r.l/MODELS.lite.limit*100)+”%”;document.getElementById(“uF”).style.width=(r.f/MODELS.flash.limit*100)+”%”;document.getElementById(“uP”).style.width=(r.p/MODELS.pro.limit*100)+”%”;document.getElementById(“uC”).textContent=(r.l+r.f+r.p).toLocaleString()}
function classify(t){if(/^(こんにちは|ありがとう|はい|hello|hi|thanks|bye|ok)/i.test(t.trim())||t.trim().length<8)return”lite”;return”flash”}
function tierQ(t){const p=classify(t);return(p===“lite”?[“lite”,“flash”,“pro”]:[“flash”,“lite”,“pro”]).filter(x=>canUse(x)&&!dead.has(x))}
async function callAI(tier,hist){
const url=`https://generativelanguage.googleapis.com/v1beta/models/${MODELS[tier].id}:generateContent?key=${apiKey}`;
const body={system_instruction:{parts:[{text:SYSTEM_PROMPT}]},contents:hist,generationConfig:{maxOutputTokens:4096,temperature:0.7}};
const res=await fetch(url,{method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify(body)});
if(!res.ok){const e=await res.json().catch(()=>({}));const msg=e?.error?.message||“Error”;if(res.status===429||msg.includes(“quota”)){dead.add(tier);const err=new Error(msg);err.isQuota=true;throw err}throw new Error(msg)}
const d=await res.json();return d?.candidates?.[0]?.content?.parts?.map(p=>p.text).join(””)||””;
}
async function sendMsg(ov){
const inp=document.getElementById(“chatIn”),text=(ov||inp.value).trim();
if(!text||loading)return;inp.value=””;updSend();
const q=tierQ(text);if(!q.length){showErr(tx().exhaust);return}
messages.push({role:“user”,content:text,model:null});renderChat();loading=true;
const hist=messages.filter((_,i)=>i>0).map(m=>({role:m.role===“assistant”?“model”:“user”,parts:[{text:m.content}]}));
for(const tier of q){hideTyp();showTyp(tier);try{const reply=await callAI(tier,hist);inc(tier);messages.push({role:“assistant”,content:reply,model:tier});hideTyp();renderChat();
crmLog(“chat”,{q:text,a:reply.substring(0,200),model:tier});
break}catch(e){if(e.isQuota)continue;hideTyp();showErr(e.message);break}}
loading=false;updUI();
}

document.getElementById(“smBtn”).className=“sbtn”+(full?” ready”:””);
}

const code=[0,1,2,3].map(i=>document.getElementById(“cd”+i).value).join(””);

const expected=getStampCode(pendingStampId);

PLAN_DATA.relax=PLAN_DATA.nature;
PLAN_DATA.adventure=PLAN_DATA.nature;

let planStep=0, planPicks=[];
function showPlanner(){planStep=0;planPicks=[];renderPlanner()}
function renderPlanner(){
const el=document.getElementById(“plannerArea”),t=tx();
if(planStep===0){
el.innerHTML=`<div style="margin-top:12px" class="anim"> <div style="font-size:14px;font-weight:600;text-align:center;margin-bottom:12px">${lang==="ja"?"興味を選んでください（最大2つ）":"Pick your interests (max 2)"}</div> <div class="sv-opts">${PLAN_INTERESTS.map(i=>`<button class=“sv-opt${planPicks.includes(i.id)?” sel”:””}” onclick=“planToggle(’${i.id}’)”>${tt(i.l)}</button>`).join("")}</div> <div class="sv-nav"><button class="sv-btn sv-btn-next" ${planPicks.length===0?"disabled":""} onclick="planStep=1;renderPlanner()">${lang==="ja"?"プラン作成":"Build Plan"}</button></div> </div>`;
} else {
const key=planPicks[0];
const plan=PLAN_DATA[key]||PLAN_DATA.history;
el.innerHTML=`<div style="margin-top:12px" class="anim"> <div style="font-size:14px;font-weight:600;text-align:center;margin-bottom:12px">${lang==="ja"?"あなたの和歌山プラン":"Your Wakayama Plan"}</div> ${plan.map(p=>`<div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--ib)">
<div style="font-size:13px;font-weight:700;color:var(--sky);min-width:50px">${p.t}</div>
<div><div style="font-size:13px;font-weight:600">${tt(p.n)}</div><div style="font-size:11px;color:var(--t2)">${tt(p.d)}</div></div>
</div>`).join("")} <div class="sv-nav"><button class="sv-btn sv-btn-back" onclick="planStep=0;renderPlanner()">${lang==="ja"?"やり直す":"Start Over"}</button></div> </div>`;
crmLog(“planner”,{interest:key});
}
}
function planToggle(id){if(planPicks.includes(id))planPicks=planPicks.filter(x=>x!==id);else if(planPicks.length<2)planPicks.push(id);renderPlanner()}
</script>
